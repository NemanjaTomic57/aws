AWSTemplateFormatVersion: '2010-09-09'
Description: >
  EC2-hosted web application that calls a Lambda function via API Gateway
  to display the visitor's IP address.

Parameters:
  InstanceType:
    Type: String
    Default: t3.micro

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

Resources:

  #######################################
  # Security Group
  #######################################
  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  #######################################
  # Lambda IAM Role
  #######################################
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${AWS::StackName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - lambda.amazonaws.com
            Action:
              - sts:AssumeRole

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  #######################################
  # Lambda Function
  #######################################
  IpLookupFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-ip-lookup"
      Runtime: python3.12
      Handler: index.lambda_handler
      Timeout: 10
      Role: !GetAtt LambdaExecutionRole.Arn

      Code:
        ZipFile: |
          import json

          def lambda_handler(event, context):
              headers = event.get("headers", {})

              ip = (
                  headers.get("X-Forwarded-For", "").split(",")[0].strip()
                  or event.get("requestContext", {})
                         .get("http", {})
                         .get("sourceIp", "unknown")
              )

              return {
                  "statusCode": 200,
                  "headers": {
                      "Content-Type": "application/json",
                      "Access-Control-Allow-Origin": "*"
                  },
                  "body": json.dumps({
                      "ip": ip
                  })
              }

  #######################################
  # API Gateway HTTP API
  #######################################
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: UserIpApi
      ProtocolType: HTTP

  LambdaIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt IpLookupFunction.Arn
      PayloadFormatVersion: "2.0"

  ApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: "GET /ip"
      Target: !Join
        - /
        - - integrations
          - !Ref LambdaIntegration

  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: "$default"
      AutoDeploy: true

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref IpLookupFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HttpApi}/*"

  #######################################
  # EC2 Instance
  #######################################
  WebServer:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref LatestAmiId
      InstanceType: !Ref InstanceType

      SecurityGroupIds:
        - !Ref WebSecurityGroup

      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            VolumeSize: 8
            VolumeType: gp3
            DeleteOnTermination: true

      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          dnf update -y
          dnf install -y nginx

          cat > /usr/share/nginx/html/index.html <<EOF
          <!DOCTYPE html>
          <html>
          <head>
              <title>Welcome</title>
              <style>
                  body {
                      font-family: Arial, sans-serif;
                      text-align: center;
                      margin-top: 100px;
                  }

                  .card {
                      display: inline-block;
                      padding: 30px;
                      border-radius: 10px;
                      box-shadow: 0 0 10px rgba(0,0,0,.15);
                  }

                  #ip {
                      font-size: 24px;
                      font-weight: bold;
                      color: #0066cc;
                  }
              </style>
          </head>
          <body>

              <div class="card">
                  <h1>Welcome to the Demo Application</h1>
                  <p>Your public IP address is:</p>
                  <p id="ip">Loading...</p>
              </div>

              <script>
                  fetch('${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/ip')
                    .then(response => response.json())
                    .then(data => {
                        document.getElementById('ip').innerText = data.ip;
                    })
                    .catch(error => {
                        document.getElementById('ip').innerText =
                          'Unable to determine IP';
                        console.error(error);
                    });
              </script>

          </body>
          </html>
          EOF

          systemctl enable nginx
          systemctl start nginx

Outputs:

  WebsiteURL:
    Description: URL of the web application
    Value: !Sub "http://${WebServer.PublicIp}"

  ApiEndpoint:
    Description: API Gateway endpoint
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/ip"

  InstancePublicIp:
    Description: Public IP of EC2 instance
    Value: !GetAtt WebServer.PublicIp
