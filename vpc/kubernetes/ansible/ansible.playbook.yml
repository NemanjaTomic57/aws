---
- name: Install containerd from official binaries
  hosts: all
  become: true

  vars:
    containerd_version: "2.2.0"
    runc_version: "1.3.0"
    cni_plugins_version: "1.7.1"

    arch_map:
      x86_64: amd64
      aarch64: arm64

    arch: "{{ arch_map[ansible_facts['architecture']] | default('amd64') }}"

    containerd_tarball: "containerd-{{ containerd_version }}-linux-{{ arch }}.tar.gz"
    containerd_url: "https://github.com/containerd/containerd/releases/download/v{{ containerd_version }}/{{ containerd_tarball }}"

    runc_binary: "runc.{{ arch }}"
    runc_url: "https://github.com/opencontainers/runc/releases/download/v{{ runc_version }}/{{ runc_binary }}"

    cni_tarball: "cni-plugins-linux-{{ arch }}-v{{ cni_plugins_version }}.tgz"
    cni_url: "https://github.com/containernetworking/plugins/releases/download/v{{ cni_plugins_version }}/{{ cni_tarball }}"

  tasks:
    - name: Enable IPv4 packet forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: '1'
        sysctl_set: true
        state: present
        reload: true

    - name: Disable swap immediately
      ansible.builtin.command: swapoff -a
      changed_when: ansible_facts["swaptotal_mb"] > 0

    - name: Remove swap entry from /etc/fstab
      ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^([^#].*\sswap\s+.*)$'
        replace: '# \1'

    - name: Install required packages
      ansible.builtin.package:
        name:
          - curl
          - tar
        state: present

    - name: Download containerd archive
      ansible.builtin.get_url:
        url: "{{ containerd_url }}"
        dest: "/tmp/{{ containerd_tarball }}"
        mode: "0644"

    - name: Extract containerd binaries
      ansible.builtin.unarchive:
        src: "/tmp/{{ containerd_tarball }}"
        dest: /usr/local
        remote_src: true

    - name: Download containerd systemd service
      ansible.builtin.get_url:
        url: "https://raw.githubusercontent.com/containerd/containerd/main/containerd.service"
        dest: /etc/systemd/system/containerd.service
        mode: "0644"

    - name: Download runc binary
      ansible.builtin.get_url:
        url: "{{ runc_url }}"
        dest: /usr/local/sbin/runc
        mode: "0755"

    - name: Create CNI plugin directory
      ansible.builtin.file:
        path: /opt/cni/bin
        state: directory
        mode: "0755"

    - name: Download CNI plugins
      ansible.builtin.get_url:
        url: "{{ cni_url }}"
        dest: "/tmp/{{ cni_tarball }}"
        mode: "0644"

    - name: Extract CNI plugins
      ansible.builtin.unarchive:
        src: "/tmp/{{ cni_tarball }}"
        dest: /opt/cni/bin
        remote_src: true

    - name: Create containerd config directory
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        mode: "0755"

    - name: Generate default containerd config
      ansible.builtin.command:
        cmd: containerd config default
      register: containerd_config
      changed_when: false

    - name: Write containerd config
      ansible.builtin.copy:
        dest: /etc/containerd/config.toml
        content: "{{ containerd_config.stdout }}"
        mode: "0644"
      changed_when: false

    - name: Enable SystemdCgroup
      ansible.builtin.replace:
        path: /etc/containerd/config.toml
        regexp: 'SystemdCgroup = false'
        replace: 'SystemdCgroup = true'
      changed_when: false

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Enable and start containerd
      ansible.builtin.systemd:
        name: containerd
        enabled: true
        state: started


- name: Install Kubernetes packages on Debian/Ubuntu
  hosts: all
  become: true
  vars:
    kubernetes_version: "v1.36"
    kubernetes_apt_keyring: "/etc/apt/keyrings/kubernetes-apt-keyring.gpg"
    kubernetes_repo: "deb [signed-by={{ kubernetes_apt_keyring }}] https://pkgs.k8s.io/core:/stable:/{{ kubernetes_version }}/deb/ /"

  tasks:
    - name: Update apt package index
      ansible.builtin.apt:
        update_cache: true

    - name: Install required packages
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gpg
        state: present

    - name: Download Kubernetes GPG key
      ansible.builtin.shell: |
        set -o pipefail
        curl -fsSL https://pkgs.k8s.io/core:/stable:/{{ kubernetes_version }}/deb/Release.key \
        | gpg --dearmor -o {{ kubernetes_apt_keyring }}
      args:
        creates: "{{ kubernetes_apt_keyring }}"

    - name: Add Kubernetes apt repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/kubernetes.list
        content: "{{ kubernetes_repo }}\n"
        mode: "0644"

    - name: Update apt package index after adding Kubernetes repo
      ansible.builtin.apt:
        update_cache: true

    - name: Install Kubernetes packages
      ansible.builtin.apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
          - vim
        state: present

    - name: Hold Kubernetes packages at current version
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubeadm
        - kubectl

    - name: Enable and start kubelet service
      ansible.builtin.systemd:
        name: kubelet
        enabled: true
        state: started

    - name: Add kubectl aliases
      ansible.builtin.copy:
        dest: /etc/profile.d/kubectl_aliases.sh
        mode: '0755'
        content: |
          alias k='kubectl'
          alias kgp='kubectl get pods'
          alias kgs='kubectl get svc'
          alias kga='kubectl get all'
          alias kdp='kubectl describe pod'
          source <(kubectl completion bash)
          complete -o default -F __start_kubectl k


- name: Configure Keepalived and HAProxy
  hosts: all
  become: true

  vars:
    interface: ens5
    router_id: 51
    auth_pass: 42
    apiserver_src_port: 6443
    apiserver0_ip: "{{ hostvars['controlplane0']['ansible_host'] }}"
    apiserver1_ip: "{{ hostvars['controlplane1']['ansible_host'] }}"
    apiserver2_ip: "{{ hostvars['controlplane2']['ansible_host'] }}"

  tasks:
    - name: Download apt dependencies
      ansible.builtin.apt:
        name:
          - keepalived
        update_cache: true
        cache_valid_time: 3600

    #################################################################
    # KEEPALIVED
    #################################################################
    - name: Set keepalived state and priority
      ansible.builtin.set_fact:
        keepalived_state: >-
          {{ 'MASTER' if inventory_hostname == 'controlplane0' else 'BACKUP' }}
        keepalived_priority: >-
          {{ '101' if inventory_hostname == 'controlplane0' else '100' }}

    - name: Deploy Keepalived configuration
      ansible.builtin.template:
        src: keepalived.conf.j2
        dest: /etc/keepalived/keepalived.conf
        owner: root
        group: root
        mode: "0644"

    - name: Create Keepalived healthcheck
      ansible.builtin.template:
        src: check_apiserver.sh
        dest: /etc/keepalived/check_apiserver.sh
        mode: "0744"

    - name: Restart Keepalived
      ansible.builtin.systemd:
        name: keepalived
        state: restarted
        enabled: true

    #################################################################
    # HAPROXY
    #################################################################
    - name: Ensure keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download HAProxy repository GPG key
      ansible.builtin.get_url:
        url: https://haproxy.debian.net/haproxy-archive-keyring.gpg
        dest: /etc/apt/keyrings/haproxy-archive-keyring.gpg
        mode: '0644'

    - name: Add HAProxy repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/haproxy.list
        content: |
          deb [signed-by=/etc/apt/keyrings/haproxy-archive-keyring.gpg] https://haproxy.debian.net trixie-backports-3.2 main
        mode: '0644'

    - name: Install HAProxy 3.2
      ansible.builtin.apt:
        name: "haproxy=3.2.*"
        state: present
        update_cache: true

    - name: Configure HAProxy
      ansible.builtin.template:
        src: haproxy.cfg
        dest: /etc/haproxy/haproxy.cfg
        mode: "0644"

    - name: Restart HAProxy
      ansible.builtin.systemd:
        name: haproxy
        state: restarted
        enabled: true
